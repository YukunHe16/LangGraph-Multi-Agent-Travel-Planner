app:
  name: Project1 Travel Planner API
  env: dev
  host: 127.0.0.1
  port: 8010
  cors_origins: http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:3000

planner:
  graph_name: planner_bootstrap_graph
  default_message: planner graph bootstrapped

providers:
  llm_provider: openai
  llm_model: gpt-4o-mini
  amap_api_key: ""
  unsplash_access_key: ""
  map_provider: amap
  map_provider_fallback: ""
  google_maps_api_key: ""
  photo_provider: unsplash
  photo_provider_fallback: ""
  google_places_api_key: ""
  flight_provider: amadeus
  flight_provider_fallback: ""
  amadeus_base_url: "https://test.api.amadeus.com"
  amadeus_client_id: ""
  amadeus_client_secret: ""
  visa_provider: sherpa
  visa_provider_fallback: ""
  sherpa_base_url: "https://requirements-api.joinsherpa.com"
  sherpa_api_key: ""
  visa_api_whitelist: "api.joinsherpa.com,requirements-api.joinsherpa.com"

rag:
  enabled: true
  source: wikivoyage_cn_jp
  integration_mode: external_mcp_rag
  mcp_rag_project_root: ""
  index_name: wikivoyage_cn_jp_attractions
